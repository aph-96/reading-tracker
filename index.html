<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>My Reading Tracker</h1>

    <!-- Form to add or update books -->
    <form id="bookForm">
      <input type="text" id="bookName" placeholder="Book Name" required />
      <button type="button" onclick="addBook()">Add/Update Book</button>
    </form>

    <!-- Display total books read -->
    <h2>Total Books Read: <span id="totalBooksRead">0</span></h2>

    <!-- Book List -->
    <ul id="bookList"></ul>

    <script src="script.js"></script>
  </body>
</html>
